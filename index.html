<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cesium Camera AR Overlay</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <link
            href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
            rel="stylesheet"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: sans-serif;
        }

        #cameraVideo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
            z-index: 0;
        }

        #cesiumContainer {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: transparent !important;
        }

        #cesiumContainer canvas {
            background: transparent !important;
        }

        #ui {
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 320px;
            font-size: 13px;
            line-height: 1.5;
        }

        #ui button {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #2d7ef7;
            color: white;
            font-size: 14px;
        }

        #ui input[type="range"] {
            width: 100%;
        }

        .row {
            margin-top: 8px;
        }

        .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .small {
            margin-top: 6px;
            font-size: 12px;
            opacity: 0.85;
            word-break: break-all;
        }
    </style>
</head>
<body>
<video id="cameraVideo" autoplay playsinline muted></video>
<div id="cesiumContainer"></div>

<div id="ui">
    <div id="ui_box" style="display: block">
        <div><b>Cesium AR Overlay Demo</b></div>
        <div id="status">초기화 대기중...</div>

        <button id="startBtn">카메라 / 위치 / 센서 시작</button>
        <!-- <button id="calibrateBtn">정면 기준 보정</button> -->

        <div class="row">
            <div class="label"><span>Heading Offset</span><span id="headingVal">0</span></div>
            <input id="headingOffset" type="range" min="-180" max="180" step="1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Pitch Offset</span><span id="pitchVal">0</span></div>
            <input id="pitchOffset" type="range" min="-90" max="90" step="1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Height Offset (m)</span><span id="heightVal">0</span></div>
            <input id="heightOffset" type="range" min="-100" max="100" step="1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Zoom(FOV)</span><span id="fovVal">60</span></div>
            <input id="fovRange" type="range" min="10" max="60" step="1" value="60" />
        </div>

        <div class="small" id="coordText">현재 좌표: 아직 없음</div>
        <div class="small" id="sensorText">센서값: 아직 없음</div>
    </div>

    <button id="uiBtnId" onclick="uiBtn()">닫기</button>
</div>

<script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0NDVmZDE1OC1hYzlhLTQzYTMtOTgzNi1kOWQxN2Q2OTc3N2QiLCJpZCI6MjE2OTMyLCJpYXQiOjE3NjY0ODM1ODd9.mRp72jy1bvm4Zxie2rZv2wNHhQUBpaDup1dC2eQFd-0";

    const statusEl = document.getElementById("status");
    const coordTextEl = document.getElementById("coordText");
    const sensorTextEl = document.getElementById("sensorText");
    const videoEl = document.getElementById("cameraVideo");
    const startBtn = document.getElementById("startBtn");
    const calibrateBtn = document.getElementById("calibrateBtn");

    const headingOffsetEl = document.getElementById("headingOffset");
    const pitchOffsetEl = document.getElementById("pitchOffset");
    const heightOffsetEl = document.getElementById("heightOffset");
    const fovRangeEl = document.getElementById("fovRange");

    const headingVal = document.getElementById("headingVal");
    const pitchVal = document.getElementById("pitchVal");
    const heightVal = document.getElementById("heightVal");
    const fovVal = document.getElementById("fovVal");

    let currentLon = null;
    let currentLat = null;
    let currentHeight = 30;
    let groundHeight = 0;

    let customTileset = null;

    let gpsStarted = false;
    let orientationStarted = false;
    let cameraStarted = false;
    let watchId = null;
    let hasFirstGpsFix = false;

    let lastAlpha = 0;
    let lastBeta = 0;
    let lastGamma = 0;

    let latestHeadingDeg = 0;
    let latestPitchDeg = -10;
    let latestRollDeg = 0;

    let calibratedAlpha = null;
    let calibratedBeta = null;

    const eyeHeightMeters = 1.6;

    const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        infoBox: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        selectionIndicator: false,
        shouldAnimate: true,
        terrain: Cesium.Terrain.fromWorldTerrain(),
        contextOptions: {
            webgl: {
                alpha: true
            }
        }
    });

    viewer.scene.backgroundColor = Cesium.Color.TRANSPARENT;
    viewer.scene.skyBox.show = false;
    viewer.scene.skyAtmosphere.show = false;
    viewer.scene.globe.baseColor = Cesium.Color.TRANSPARENT;
    viewer.scene.globe.showGroundAtmosphere = false;
    viewer.scene.globe.show = false;
    viewer.cesiumWidget.creditContainer.style.display = "none";
    viewer.scene.requestRenderMode = false;

    viewer.camera.frustum.fov = Cesium.Math.toRadians(60);
    viewer.camera.frustum.near = 0.1;
    viewer.camera.frustum.far = 5000.0;

    const ssc = viewer.scene.screenSpaceCameraController;
    ssc.enableRotate = false;
    ssc.enableTranslate = false;
    ssc.enableZoom = false;
    ssc.enableTilt = false;
    ssc.enableLook = false;
    ssc.enableInputs = false;

    function normalizeDegrees(deg) {
        let d = deg % 360;
        if (d < 0) d += 360;
        return d;
    }

    function updateOffsetLabels() {
        headingVal.textContent = headingOffsetEl.value;
        pitchVal.textContent = pitchOffsetEl.value;
        heightVal.textContent = heightOffsetEl.value;
        fovVal.textContent = fovRangeEl.value;
    }

    function updateCoordText() {
        if (currentLon == null || currentLat == null) {
            coordTextEl.textContent = "현재 좌표: 아직 없음";
            return;
        }

        coordTextEl.textContent =
            `현재 좌표: lon=${currentLon.toFixed(6)}, lat=${currentLat.toFixed(6)}, gpsH=${(currentHeight ?? 0).toFixed(1)}, ground=${groundHeight.toFixed(1)}`;
    }

    function updateSensorText() {
        sensorTextEl.textContent =
            `센서값: alpha=${lastAlpha.toFixed(1)}, beta=${lastBeta.toFixed(1)}, gamma=${lastGamma.toFixed(1)} / ` +
            `heading=${latestHeadingDeg.toFixed(1)}, pitch=${latestPitchDeg.toFixed(1)}, roll=${latestRollDeg.toFixed(1)}`;
    }

    async function updateGroundHeight() {
        if (currentLon == null || currentLat == null) return;

        try {
            const cartographic = Cesium.Cartographic.fromDegrees(currentLon, currentLat);
            const updated = await Cesium.sampleTerrainMostDetailed(
                viewer.terrainProvider,
                [cartographic]
            );

            if (updated && updated.length > 0 && Number.isFinite(updated[0].height)) {
                groundHeight = updated[0].height;
            }
        } catch (e) {
            console.warn("지면 높이 조회 실패:", e);
        }
    }

    function applyCameraPose() {
        if (currentLon == null || currentLat == null) return;

        const headingOffset = Number(headingOffsetEl.value) || 0;
        const pitchOffset = Number(pitchOffsetEl.value) || 0;
        const heightOffset = Number(heightOffsetEl.value) || 0;

        const alphaBase = calibratedAlpha ?? 0;
        const betaBase = calibratedBeta ?? 0;

        // 예전처럼 바로 반응하는 방식
        const relativeAlpha = lastAlpha - alphaBase;
        const relativeBeta = lastBeta - betaBase;

        latestHeadingDeg = normalizeDegrees(360 - relativeAlpha + headingOffset);
        latestPitchDeg = Cesium.Math.clamp((relativeBeta - 90) + pitchOffset, -89, 89);
        latestRollDeg = lastGamma * 0.2;

        const position = Cesium.Cartesian3.fromDegrees(
            currentLon,
            currentLat,
            groundHeight + eyeHeightMeters + heightOffset
        );

        viewer.camera.setView({
            destination: position,
            orientation: {
                heading: Cesium.Math.toRadians(latestHeadingDeg),
                pitch: Cesium.Math.toRadians(latestPitchDeg),
                roll: Cesium.Math.toRadians(latestRollDeg)
            }
        });

        updateSensorText();
    }

    function moveCameraToCurrentPositionOnly() {
        if (currentLon == null || currentLat == null) return;

        const heightOffset = Number(heightOffsetEl.value) || 0;

        const destination = Cesium.Cartesian3.fromDegrees(
            currentLon,
            currentLat,
            groundHeight + eyeHeightMeters + heightOffset
        );

        viewer.camera.setView({
            destination,
            orientation: {
                heading: 0,
                pitch: 0,
                roll: 0
            }
        });
    }

    async function loadCustomTileset() {
        try {
            if (customTileset) return;

            statusEl.textContent = "타일셋 로드중...";
            customTileset = await Cesium.Cesium3DTileset.fromUrl(
                "https://seoul.gaia3d.com:10107/tileset/tn_buld_tiles_merge1/tileset.json",
                {
                    maximumScreenSpaceError: 24,
                    skipLevelOfDetail: true,
                    preferLeaves: true,
                    dynamicScreenSpaceError: true,
                    preloadWhenHidden: false,
                    cullWithChildrenBounds: true
                }
            );

            viewer.scene.primitives.add(customTileset);
            statusEl.textContent = "타일셋 로드 완료";
        } catch (e) {
            console.error(e);
            statusEl.textContent = `타일셋 로드 실패: ${e.message}`;
        }
    }

    async function startCamera() {
        if (cameraStarted) return;

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        videoEl.srcObject = stream;
        await videoEl.play();
        cameraStarted = true;
    }

    function waitForFirstGpsFix(timeoutMs = 15000) {
        return new Promise((resolve, reject) => {
            const startTime = Date.now();

            const timer = setInterval(() => {
                if (hasFirstGpsFix && currentLon != null && currentLat != null) {
                    clearInterval(timer);
                    resolve();
                    return;
                }

                if (Date.now() - startTime > timeoutMs) {
                    clearInterval(timer);
                    reject(new Error("현재 위치를 가져오지 못했습니다. 실외에서 위치 권한을 확인해보세요."));
                }
            }, 300);
        });
    }

    function startGeolocation() {
        if (gpsStarted) return;
        if (!navigator.geolocation) {
            throw new Error("이 브라우저는 geolocation을 지원하지 않습니다.");
        }

        watchId = navigator.geolocation.watchPosition(
            async (pos) => {
                currentLon = pos.coords.longitude;
                currentLat = pos.coords.latitude;
                currentHeight = pos.coords.altitude ?? 30;
                hasFirstGpsFix = true;

                await updateGroundHeight();
                updateCoordText();

                if (!orientationStarted) {
                    moveCameraToCurrentPositionOnly();
                } else {
                    applyCameraPose();
                }

                statusEl.textContent =
                    `GPS 수신중: ${currentLat.toFixed(6)}, ${currentLon.toFixed(6)}, h=${currentHeight.toFixed(1)}`;
            },
            (err) => {
                console.error(err);
                statusEl.textContent = `GPS 실패: ${err.message}`;
            },
            {
                enableHighAccuracy: true,
                maximumAge: 1000,
                timeout: 10000
            }
        );

        gpsStarted = true;
    }

    function calibrateForwardView() {
        calibratedAlpha = lastAlpha;
        calibratedBeta = lastBeta;

        if (currentLon != null && currentLat != null) {
            applyCameraPose();
        }

        statusEl.textContent = "정면 기준 보정 완료";
    }

    function handleDeviceOrientation(event) {
        lastAlpha = event.alpha ?? 0;
        lastBeta = event.beta ?? 0;
        lastGamma = event.gamma ?? 0;

        if (currentLon == null || currentLat == null) {
            updateSensorText();
            return;
        }

        applyCameraPose();
    }

    async function requestiOSMotionPermissionIfNeeded() {
        if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
            const result = await DeviceOrientationEvent.requestPermission();
            if (result !== "granted") {
                throw new Error("iOS 센서 권한이 거부되었습니다.");
            }
        }
    }

    function startOrientationTracking() {
        if (orientationStarted) return;
        window.addEventListener("deviceorientation", handleDeviceOrientation, true);
        orientationStarted = true;
    }

    function uiBtn() {
        const box = document.getElementById("ui_box");
        const btn = document.getElementById("uiBtnId");

        if (box.style.display === "none") {
            box.style.display = "block";
            btn.innerText = "닫기";
        } else {
            box.style.display = "none";
            btn.innerText = "열기";
        }
    }

    headingOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        applyCameraPose();
    });

    pitchOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        applyCameraPose();
    });

    heightOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        applyCameraPose();
    });

    fovRangeEl.addEventListener("input", () => {
        updateOffsetLabels();
        viewer.camera.frustum.fov = Cesium.Math.toRadians(Number(fovRangeEl.value));
        viewer.scene.requestRender();
    });

    /*calibrateBtn.addEventListener("click", () => {
        calibrateForwardView();
    });*/

    startBtn.addEventListener("click", async () => {
        try {
            statusEl.textContent = "권한 요청중...";

            await startCamera();
            await requestiOSMotionPermissionIfNeeded();
            startOrientationTracking();

            statusEl.textContent = "현재 위치 가져오는 중...";
            startGeolocation();
            await waitForFirstGpsFix();

            await updateGroundHeight();
            await loadCustomTileset();

            updateCoordText();
            moveCameraToCurrentPositionOnly();

            statusEl.textContent = "카메라 / 현재위치 / 센서 / 타일셋 시작됨";
        } catch (e) {
            console.error(e);
            statusEl.textContent = `초기화 실패: ${e.message}`;
        }
    });

    updateOffsetLabels();
</script>
</body>
</html>
