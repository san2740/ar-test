<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cesium Camera AR Overlay</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: sans-serif;
        }

        #cameraVideo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
            z-index: 0;
        }

        #cesiumContainer {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: transparent !important;
        }

        #cesiumContainer canvas {
            background: transparent !important;
        }

        #ui {
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 320px;
            font-size: 13px;
            line-height: 1.5;
        }

        #ui button {
            width: 100%;
            margin-top: 6px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #2d7ef7;
            color: white;
            font-size: 14px;
        }

        #ui input[type="range"] {
            width: 100%;
        }

        .row {
            margin-top: 8px;
        }

        .label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .small {
            margin-top: 6px;
            font-size: 12px;
            opacity: 0.9;
            word-break: break-all;
        }
    </style>
</head>
<body>
<video id="cameraVideo" autoplay playsinline muted></video>
<div id="cesiumContainer"></div>

<div id="ui">
    <div id="ui_box" style="display: block">
        <div><b>Cesium AR Overlay Demo</b></div>
        <div id="status">초기화 대기중...</div>

        <button id="startBtn">카메라 / 위치 / 센서 시작</button>
        <button id="calibrateBtn">정면 기준 보정</button>
        <button id="placeTestBoxBtn">정면 20m 테스트 박스 생성</button>
        <button id="removeTestBoxBtn">테스트 박스 삭제</button>

        <div class="row">
            <div class="label"><span>Heading Offset</span><span id="headingVal">0</span></div>
            <input id="headingOffset" type="range" min="-180" max="180" step="1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Pitch Offset</span><span id="pitchVal">0</span></div>
            <input id="pitchOffset" type="range" min="-90" max="90" step="1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Height Offset (m)</span><span id="heightVal">0</span></div>
            <input id="heightOffset" type="range" min="-20" max="20" step="0.1" value="0" />
        </div>

        <div class="row">
            <div class="label"><span>Zoom(FOV)</span><span id="fovVal">18</span></div>
            <input id="fovRange" type="range" min="10" max="60" step="1" value="18" />
        </div>

        <div class="small" id="coordText">현재 좌표: 아직 없음</div>
        <div class="small" id="sensorText">센서값: 아직 없음</div>
    </div>

    <button id="uiBtnId" onclick="uiBtn()">닫기</button>
</div>

<script>
    Cesium.Ion.defaultAccessToken = "YOUR_CESIUM_ION_TOKEN";

    const statusEl = document.getElementById("status");
    const coordTextEl = document.getElementById("coordText");
    const sensorTextEl = document.getElementById("sensorText");
    const videoEl = document.getElementById("cameraVideo");
    const startBtn = document.getElementById("startBtn");
    const calibrateBtn = document.getElementById("calibrateBtn");

    const headingOffsetEl = document.getElementById("headingOffset");
    const pitchOffsetEl = document.getElementById("pitchOffset");
    const heightOffsetEl = document.getElementById("heightOffset");
    const fovRangeEl = document.getElementById("fovRange");

    const headingVal = document.getElementById("headingVal");
    const pitchVal = document.getElementById("pitchVal");
    const heightVal = document.getElementById("heightVal");
    const fovVal = document.getElementById("fovVal");

    const placeTestBoxBtn = document.getElementById("placeTestBoxBtn");
    const removeTestBoxBtn = document.getElementById("removeTestBoxBtn");

    let testBoxEntity = null;

    let currentLon = null;
    let currentLat = null;
    let currentHeight = 0;

    let osmBuildings = null;
    let gpsStarted = false;
    let orientationStarted = false;
    let cameraStarted = false;
    let watchId = null;
    let hasFirstGpsFix = false;

    let latestHeadingDeg = 0;
    let latestPitchDeg = 0;
    let latestRollDeg = 0;

    let lastAlpha = 0;
    let lastBeta = 0;
    let lastGamma = 0;

    // 정면 기준 보정값
    let calibratedAlpha = null;
    let calibratedBeta = null;

    // GPS 이동 디버깅용
    let prevLon = null;
    let prevLat = null;

    // 눈높이 고정
    const eyeHeightMeters = 1.6;

    function getForwardOffsetMeters(distanceMeters, headingDeg) {
        const headingRad = Cesium.Math.toRadians(headingDeg);
        const east = Math.sin(headingRad) * distanceMeters;
        const north = Math.cos(headingRad) * distanceMeters;
        return { east, north };
    }

    function offsetLonLatByMeters(lon, lat, eastMeters, northMeters) {
        const latRad = Cesium.Math.toRadians(lat);
        const metersPerDegLat = 111320;
        const metersPerDegLon = 111320 * Math.cos(latRad);

        const dLat = northMeters / metersPerDegLat;
        const dLon = eastMeters / metersPerDegLon;

        return {
            lon: lon + dLon,
            lat: lat + dLat
        };
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = Cesium.Math.toRadians(lat2 - lat1);
        const dLon = Cesium.Math.toRadians(lon2 - lon1);

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(Cesium.Math.toRadians(lat1)) *
            Math.cos(Cesium.Math.toRadians(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);

        return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function placeTestBox(distanceMeters = 20) {
        if (currentLon == null || currentLat == null) {
            statusEl.textContent = "현재 위치 없음";
            return;
        }

        if (testBoxEntity) {
            viewer.entities.remove(testBoxEntity);
        }

        const { east, north } = getForwardOffsetMeters(distanceMeters, latestHeadingDeg);
        const target = offsetLonLatByMeters(currentLon, currentLat, east, north);
        const height = eyeHeightMeters + 3;

        testBoxEntity = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, height),
            box: {
                dimensions: new Cesium.Cartesian3(4, 4, 4),
                material: Cesium.Color.RED.withAlpha(0.8),
                outline: true,
                outlineColor: Cesium.Color.WHITE
            },
            label: {
                text: "TEST 20m",
                font: "16px sans-serif",
                pixelOffset: new Cesium.Cartesian2(0, -40),
                fillColor: Cesium.Color.WHITE,
                showBackground: true,
                backgroundColor: Cesium.Color.BLACK.withAlpha(0.6)
            }
        });

        statusEl.textContent = "정면 20m 테스트 박스 생성";
    }

    function removeTestBox() {
        if (testBoxEntity) {
            viewer.entities.remove(testBoxEntity);
            testBoxEntity = null;
            statusEl.textContent = "테스트 박스 삭제";
        }
    }

    placeTestBoxBtn.addEventListener("click", () => placeTestBox(20));
    removeTestBoxBtn.addEventListener("click", () => removeTestBox());

    function updateOffsetLabels() {
        headingVal.textContent = headingOffsetEl.value;
        pitchVal.textContent = pitchOffsetEl.value;
        heightVal.textContent = heightOffsetEl.value;
        fovVal.textContent = fovRangeEl.value;
    }

    headingOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        updateCameraPose();
    });

    pitchOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        updateCameraPose();
    });

    heightOffsetEl.addEventListener("input", () => {
        updateOffsetLabels();
        updateCameraPose();
    });

    fovRangeEl.addEventListener("input", () => {
        updateOffsetLabels();
        viewer.camera.frustum.fov = Cesium.Math.toRadians(Number(fovRangeEl.value));
        viewer.scene.requestRender();
    });

    updateOffsetLabels();

    const viewer = new Cesium.Viewer("cesiumContainer", {
        animation: false,
        timeline: false,
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        infoBox: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        fullscreenButton: false,
        selectionIndicator: false,
        shouldAnimate: true,
        contextOptions: {
            webgl: {
                alpha: true
            }
        }
    });

    viewer.scene.backgroundColor = Cesium.Color.TRANSPARENT;
    viewer.scene.skyBox.show = false;
    viewer.scene.skyAtmosphere.show = false;
    viewer.scene.globe.baseColor = Cesium.Color.TRANSPARENT;
    viewer.scene.globe.showGroundAtmosphere = false;
    viewer.scene.globe.show = false;
    viewer.cesiumWidget.creditContainer.style.display = "none";
    viewer.scene.requestRenderMode = false;

    // 확대 느낌
    viewer.camera.frustum.fov = Cesium.Math.toRadians(18);
    viewer.camera.frustum.near = 0.1;
    viewer.camera.frustum.far = 5000.0;

    function normalizeDegrees(deg) {
        let d = deg % 360;
        if (d < 0) d += 360;
        return d;
    }

    function updateCoordText() {
        if (currentLon == null || currentLat == null) {
            coordTextEl.textContent = "현재 좌표: 아직 없음";
            return;
        }

        coordTextEl.textContent =
            `현재 좌표: lon=${currentLon.toFixed(6)}, lat=${currentLat.toFixed(6)}, h=${(currentHeight ?? 0).toFixed(1)}`;
    }

    function updateSensorText() {
        sensorTextEl.textContent =
            `센서값: heading=${latestHeadingDeg.toFixed(1)}, pitch=${latestPitchDeg.toFixed(1)}, roll=${latestRollDeg.toFixed(1)}`;
    }

    function updateCameraPose() {
        if (currentLon == null || currentLat == null) return;

        const heightOffset = Number(heightOffsetEl.value) || 0;

        const destination = Cesium.Cartesian3.fromDegrees(
            currentLon,
            currentLat,
            eyeHeightMeters + heightOffset
        );

        viewer.camera.setView({
            destination,
            orientation: {
                heading: Cesium.Math.toRadians(latestHeadingDeg),
                pitch: Cesium.Math.toRadians(latestPitchDeg),
                roll: Cesium.Math.toRadians(latestRollDeg)
            }
        });
    }

    async function loadOsmBuildings() {
        try {
            if (osmBuildings) return;

            statusEl.textContent = "OSM 건물 로드중...";
            osmBuildings = await Cesium.createOsmBuildingsAsync();
            viewer.scene.primitives.add(osmBuildings);
            statusEl.textContent = "OSM 건물 로드 완료";
        } catch (e) {
            console.error(e);
            statusEl.textContent = `OSM 건물 로드 실패: ${e.message}`;
        }
    }

    async function startCamera() {
        if (cameraStarted) return;

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        videoEl.srcObject = stream;
        await videoEl.play();
        cameraStarted = true;
    }

    function waitForFirstGpsFix(timeoutMs = 15000) {
        return new Promise((resolve, reject) => {
            const startTime = Date.now();

            const timer = setInterval(() => {
                if (hasFirstGpsFix && currentLon != null && currentLat != null) {
                    clearInterval(timer);
                    resolve();
                    return;
                }

                if (Date.now() - startTime > timeoutMs) {
                    clearInterval(timer);
                    reject(new Error("현재 위치를 가져오지 못했습니다. 실외에서 위치 권한을 확인해보세요."));
                }
            }, 300);
        });
    }

    function startGeolocation() {
        if (gpsStarted) return;
        if (!navigator.geolocation) {
            throw new Error("이 브라우저는 geolocation을 지원하지 않습니다.");
        }

        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                currentLon = pos.coords.longitude;
                currentLat = pos.coords.latitude;
                currentHeight = pos.coords.altitude ?? 0;
                hasFirstGpsFix = true;

                let movedText = "";
                if (prevLat != null && prevLon != null) {
                    const moved = distanceMeters(prevLat, prevLon, currentLat, currentLon);
                    movedText = ` / 이동=${moved.toFixed(2)}m`;
                }
                prevLat = currentLat;
                prevLon = currentLon;

                updateCoordText();
                updateCameraPose();

                statusEl.textContent =
                    `GPS 수신중: ${currentLat.toFixed(6)}, ${currentLon.toFixed(6)}${movedText}`;
            },
            (err) => {
                console.error(err);
                statusEl.textContent = `GPS 실패: ${err.message}`;
            },
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            }
        );

        gpsStarted = true;
    }

    function calibrateForwardView() {
        calibratedAlpha = lastAlpha;
        calibratedBeta = lastBeta;
        latestRollDeg = 0;
        updateCameraPose();
        statusEl.textContent = "정면 기준 보정 완료";
    }

    function handleDeviceOrientation(event) {
        if (currentLon == null || currentLat == null) return;

        const alpha = event.alpha ?? 0;
        const beta = event.beta ?? 0;
        const gamma = event.gamma ?? 0;

        lastAlpha = alpha;
        lastBeta = beta;
        lastGamma = gamma;

        const headingOffset = Number(headingOffsetEl.value) || 0;
        const pitchOffset = Number(pitchOffsetEl.value) || 0;

        if (calibratedAlpha == null) calibratedAlpha = alpha;
        if (calibratedBeta == null) calibratedBeta = beta;

        // heading
        latestHeadingDeg = normalizeDegrees(360 - alpha + headingOffset);

        // 폰을 정면으로 세운 순간을 pitch 0 기준으로 잡음
        const pitchFromCalibration = calibratedBeta - beta;
        latestPitchDeg = Cesium.Math.clamp(pitchFromCalibration + pitchOffset, -89, 89);

        // 처음엔 roll 흔들림 줄이기 위해 0 고정
        latestRollDeg = 0;

        updateSensorText();
        updateCameraPose();
    }

    async function requestiOSMotionPermissionIfNeeded() {
        if (
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
            const result = await DeviceOrientationEvent.requestPermission();
            if (result !== "granted") {
                throw new Error("iOS 센서 권한이 거부되었습니다.");
            }
        }
    }

    function startOrientationTracking() {
        if (orientationStarted) return;
        window.addEventListener("deviceorientation", handleDeviceOrientation, true);
        orientationStarted = true;
    }

    calibrateBtn.addEventListener("click", () => {
        calibrateForwardView();
    });

    function uiBtn() {
        const id = document.getElementById("ui_box");
        const btnId = document.getElementById("uiBtnId");

        if (id.style.display === "none") {
            id.style.display = "block";
            btnId.innerText = "닫기";
        } else {
            id.style.display = "none";
            btnId.innerText = "열기";
        }
    }

    startBtn.addEventListener("click", async () => {
        try {
            statusEl.textContent = "권한 요청중...";

            await startCamera();

            statusEl.textContent = "현재 위치 가져오는 중...";
            startGeolocation();
            await waitForFirstGpsFix();

            await loadOsmBuildings();
            await requestiOSMotionPermissionIfNeeded();
            startOrientationTracking();

            updateCameraPose();

            statusEl.textContent = "카메라 / 현재위치 / 센서 / OSM 건물 시작됨";
        } catch (e) {
            console.error(e);
            statusEl.textContent = `초기화 실패: ${e.message}`;
        }
    });
</script>
</body>
</html>
